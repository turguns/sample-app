apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/turguns/sample-app.git'
    targetRevision: HEAD
    path: sample-app/apps/resources
  destination:
     server: https://kubernetes.default.svc
     namespace: sample-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
